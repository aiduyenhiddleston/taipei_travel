<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們 - 台北之旅</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">台北之旅</div>
        <nav>
            <ul>
                <li><a href="../html/index.html">網站首頁</a></li>
                <li><a href="../html/tour.html">台北景點</a></li>
                <li><a href="../html/food.html">特色美食</a></li>
                <li><a href="../html/culture.html">文化習俗</a></li>
                <li><a href="../html/itinerary.html">旅游行程</a></li>
                <li><a href="../html/blog.html">部落格</a></li>
                <li><a href="../html/contact.html">聯絡我們</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero contact-hero">
        <div class="hero-content">
            <h1>台北之旅</h1>
        </div>
    </section>

    <main class="container">
        <div class="message-header">
            <h2>Message Center</h2>
            <h3>留言中心</h3>
            <div class="underline"></div>
        </div>

        <section class="contact-form-container">
            <form action="#" method="post" class="contact-form">
                <div class="form-grid">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="姓名*" required>
                    </div>
                    <div class="form-group">
                        <select name="gender" required>
                            <option value="" disabled selected>性別*</option>
                            <option value="male">男</option>
                            <option value="female">女</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="tel" name="phone" placeholder="電話" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" placeholder="電子郵局" required>
                    </div>
                </div>

                <div class="form-group-full">
                    <textarea name="message" rows="8" placeholder="您的問題或建議"></textarea>
                </div>

                <button type="submit" class="btn-submit">發送郵件</button>
            </form>
        </section>
    </main>

    <footer class="footer-bottom">
        <p>Copyright © 2026 台北之旅 版權所有</p>
    </footer>

</body>

</html>
